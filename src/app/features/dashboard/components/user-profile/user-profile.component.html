<div class="max-w-2xl mx-auto">
  <div class="bg-white rounded-3xl shadow-2xl shadow-slate-200/50 border border-slate-200 overflow-hidden">
    <div class="h-32 bg-gradient-to-r from-blue-600 to-indigo-700"></div>
    <div class="px-8 pb-8">
      <div class="relative flex justify-center">
        <div class="absolute -top-16 w-32 h-32 bg-white rounded-3xl shadow-xl flex items-center justify-center border-4 border-white">
          <div class="w-full h-full bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 text-4xl font-black">
            {{ (userData?.nombre || 'U').substring(0,1).toUpperCase() }}
          </div>
        </div>
      </div>
      
      <div class="mt-20 text-center">
        <h2 class="text-3xl font-black text-slate-800 tracking-tight">{{ userData?.nombre }}</h2>
        <p class="text-slate-500 font-medium italic">{{ userData?.email }}</p>
        
        <div class="mt-6 flex flex-wrap justify-center gap-2">
          @for (rol of userData?.roles; track rol) {
            <span class="px-4 py-2 bg-blue-50 text-blue-700 text-xs font-black rounded-xl uppercase tracking-widest border border-blue-100">
              {{ rol }}
            </span>
          }
        </div>

        <div class="mt-10 pt-8 border-t border-slate-100 grid grid-cols-2 gap-4">
          <div class="p-4 bg-slate-50 rounded-2xl">
            <span class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Estado de cuenta</span>
            <span class="text-green-600 font-bold">Verificado</span>
          </div>
          <div class="p-4 bg-slate-50 rounded-2xl">
            <span class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Nivel de Acceso</span>
            <span class="text-slate-700 font-bold">Estándar</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
