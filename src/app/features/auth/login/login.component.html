<div class="min-h-screen flex items-center justify-center bg-slate-900 p-6">
  <div class="w-full max-w-md bg-white/10 backdrop-blur-md border border-white/20 p-8 rounded-3xl shadow-2xl">
    
    <div class="text-center mb-10">
      <div class="inline-block p-4 bg-blue-600 rounded-2xl mb-4 shadow-lg shadow-blue-500/50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <h2 class="text-3xl font-black text-white tracking-tight">Workflow Engine</h2>
      <p class="text-slate-400 mt-2">Ingresa a tu panel de ingeniería</p>
    </div>

    <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-500/20 border border-red-500/50 text-red-200 text-sm rounded-xl text-center">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="space-y-6">
      <div>
        <label class="block text-xs font-bold text-blue-400 uppercase tracking-widest mb-2 ml-1">Email Corporativo</label>
        <input type="email" name="email" [(ngModel)]="credentials.email" required
          class="w-full bg-slate-800/50 border border-slate-700 text-white px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all placeholder:text-slate-600"
          placeholder="nombre@empresa.com">
      </div>

      <div>
        <label class="block text-xs font-bold text-blue-400 uppercase tracking-widest mb-2 ml-1">Contraseña</label>
        <input type="password" name="password" [(ngModel)]="credentials.password" required
          class="w-full bg-slate-800/50 border border-slate-700 text-white px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
          placeholder="••••••••">
      </div>

      <button type="submit" [disabled]="!loginForm.valid"
        class="w-full bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 text-white font-bold py-4 rounded-xl shadow-xl shadow-blue-900/20 transition-all active:scale-95 transform">
        AUTENTICAR SISTEMA
      </button>
    </form>

    <p class="text-center text-slate-500 text-xs mt-8 uppercase tracking-widest">
      UAGRM SEMESTRE 1-2026 • Acceso Restringido
    </p>
  </div>
</div>
